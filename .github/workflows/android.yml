name: Android CI

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine build type
        id: build-type
        run: |
          if [ -n "${{ github.event.inputs.build_type }}" ]; then
            echo "variant=${{ github.event.inputs.build_type }}" >> "$GITHUB_OUTPUT"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if echo "$COMMIT_MSG" | grep -qi "Release"; then
              echo "variant=release" >> "$GITHUB_OUTPUT"
            else
              echo "variant=debug" >> "$GITHUB_OUTPUT"
            fi
          fi

          VARIANT=$(grep 'variant=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)
          if [ "$VARIANT" = "release" ]; then
            echo "task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/release" >> "$GITHUB_OUTPUT"
            echo "artifact_name=HyperRoot-release" >> "$GITHUB_OUTPUT"
          else
            echo "task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/debug" >> "$GITHUB_OUTPUT"
            echo "artifact_name=HyperRoot-debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Android NDK
        uses: actions/cache@v4
        id: ndk-cache
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
          key: ndk-28.2.13676358

      - name: Install NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;28.2.13676358"

      - name: Compile daemon_runner (ARM64 static binary)
        run: |
          NDK=$ANDROID_HOME/ndk/28.2.13676358
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          CLANG=$TOOLCHAIN/bin/aarch64-linux-android35-clang
          STRIP=$TOOLCHAIN/bin/llvm-strip
          echo "--- Compiling daemon_runner ---"
          $CLANG -static -O2 -s -o daemon_runner app/src/main/jni/daemon_runner.c
          $STRIP --strip-all daemon_runner
          ls -lh daemon_runner
          file daemon_runner
          echo "--- Done ---"

      - name: Prepare assets
        run: |
          ASSETS_DIR=app/src/main/assets
          mkdir -p $ASSETS_DIR

          # Copy binary resources from data/
          cp data/busybox $ASSETS_DIR/busybox
          cp data/resetprop $ASSETS_DIR/resetprop
          cp data/magisk.apk $ASSETS_DIR/magisk.apk

          # Copy compiled daemon_runner
          cp daemon_runner $ASSETS_DIR/daemon_runner

          # Scripts are already in assets/ (committed with the repo)
          # Verify all assets exist
          echo "--- Assets ---"
          ls -la $ASSETS_DIR/
          echo "--- Done ---"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew ${{ steps.build-type.outputs.task }} --no-daemon

      - name: Rename APK
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          BUILD_TYPE="${{ steps.build-type.outputs.variant }}"

          cd ${{ steps.build-type.outputs.apk_path }}
          for apk in *.apk; do
            mv "$apk" "HyperRoot-${BUILD_TYPE}_${VERSION_NAME}+${GIT_HASH}.apk"
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-type.outputs.artifact_name }}
          path: ${{ steps.build-type.outputs.apk_path }}/*.apk
          retention-days: 30

      - name: Publish to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build-type.outputs.apk_path }}/*.apk
          generate_release_notes: true
